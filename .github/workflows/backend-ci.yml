# SolidOA 后端 CI - mvn compile 全模块
# 触发：main/master 分支 push + PR
# 使用阿里云 Maven 镜像加速（中国大陆 runner 友好）
name: Backend CI (Maven)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 防止并发跑同一个分支
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: mvn compile (全模块)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: 配置阿里云 Maven 镜像
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>aliyun-central</id>
                <name>Aliyun Maven Central Mirror</name>
                <url>https://maven.aliyun.com/repository/central</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
              <mirror>
                <id>aliyun-public</id>
                <name>Aliyun Public Mirror (Spring + Central)</name>
                <url>https://maven.aliyun.com/repository/public</url>
                <mirrorOf>*,!central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: 验证 Java 版本
        run: java -version

      - name: Maven 编译 (全模块)
        working-directory: solidoa
        run: mvn -B -e compile -DskipTests

      - name: 编译结果汇报
        if: always()
        run: echo "✅ 后端编译完成 - 查看上方日志确认 0 ERROR"
