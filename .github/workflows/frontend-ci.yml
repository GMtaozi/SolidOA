# SolidOA 前端 CI - 4 道闸
# 闸 1: type-check (vue-tsc) 闸 2: lint (eslint) 闸 3: test (vitest) 闸 4: build (vite)
# 触发：main/master 分支 push + PR
# 使用 npmmirror 淘宝镜像加速（中国大陆 runner 友好）
name: Frontend CI (4 gates)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: 4 道闸验证
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: solidoa-web/package-lock.json

      - name: 配置 npm 淘宝镜像
        run: npm config set registry https://registry.npmmirror.com

      - name: 安装依赖 (淘宝镜像)
        working-directory: solidoa-web
        run: npm ci

      - name: 闸 1 - TypeScript 类型检查
        working-directory: solidoa-web
        run: npm run type-check

      - name: 闸 2 - ESLint 检查
        working-directory: solidoa-web
        run: npm run lint

      - name: 闸 3 - Vitest 单元测试
        working-directory: solidoa-web
        run: npm run test

      - name: 闸 4 - 生产构建
        working-directory: solidoa-web
        run: npm run build 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: 闸 4 - 输出构建日志
        if: failure()
        working-directory: solidoa-web
        run: |
          echo "===== BUILD LOG TAIL (last 200 lines) ====="
          tail -n 200 /tmp/build.log 2>/dev/null || echo "no log"
          echo "===== ENV DEBUG ====="
          node -v
          npm -v
          pwd
          ls -la

      - name: 全部通过
        if: success()
        run: echo "✅ 前端 4 道闸全部通过"
