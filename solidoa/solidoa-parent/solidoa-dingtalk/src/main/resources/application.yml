server:
  port: 8087

spring:
  application:
    name: dingtalk-service

  cloud:
    nacos:
      server-addr: ${NACOS_HOST}:${NACOS_PORT}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:oa_dingtalk}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:749958714}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.solidoa.dingtalk.entity