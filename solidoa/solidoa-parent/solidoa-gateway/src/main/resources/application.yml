server:
  port: 8080

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false

    gateway:
      routes:
        # Auth - 直接路由到 System
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/login
        - id: auth-logout
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/logout

        # System Service (包含消息推送)
        - id: system-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/system/**

        # Workflow Service
        - id: workflow-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/workflow/**

        # HR Service (考勤+财务)
        - id: hr-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/hr/**

        # File Service
        - id: file-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/file/**

        # DingTalk Service
        - id: dingtalk-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/dingtalk/**

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0

jwt:
  secret: ${JWT_SECRET:solidoa-jwt-secret-key-that-is-at-least-256-bits-long}
  exclusion:
    - /api/v1/auth/login
    - /api/v1/auth/refresh
    - /api/v1/dingtalk/callback
    - /api/v1/dingtalk/check
    - /api/v1/dingtalk/oauth/url

gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:solidoa-gw-sign-2026-secure-key}

cors:
  # CORS允许的源域名，逗号分隔多个域名
  # 开发环境可设为 http://localhost:3000
  # 生产环境必须配置具体域名，如 https://example.com
  # 环境变量: CORS_ORIGINS=http://localhost:3000,https://example.com
  allowed-origins: ${CORS_ORIGINS:}

# Rate Limiter Configuration
rate-limiter:
  enabled: true
  default-limit: 100
  default-window-seconds: 60
  exclusions:
    - /api/v1/auth/login
    - /api/v1/auth/captcha
    - /api/v1/dingtalk/callback
