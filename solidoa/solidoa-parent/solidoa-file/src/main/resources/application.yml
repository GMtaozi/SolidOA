server:
  port: 8086

spring:
  application:
    name: file-service
  main:
    web-application-type: servlet
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:oa_file}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:749958714}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.solidoa.file.entity

# 网关内部签名密钥
gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:solidoa-gw-sign-2026-secure-key}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    common: solidoa-files
    leave: leave-attach
    expense: expense-invoice
    attendance: attendance-files

logging:
  level:
    com.solidoa: DEBUG