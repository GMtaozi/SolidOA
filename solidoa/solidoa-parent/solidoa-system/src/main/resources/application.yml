server:
  port: 8081

spring:
  application:
    name: system-service
  main:
    web-application-type: servlet
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
  aop:
    auto: false  # 禁用 AOP
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:oa_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:749958714}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.solidoa.system.entity

# 网关内部签名密钥（需与 gateway 保持一致）
gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:solidoa-gw-sign-2026-secure-key}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:solidoa-jwt-secret-key-that-is-at-least-256-bits-long}
  expiration: 3600
  refresh-expiration: 604800

# Feign 客户端配置（无 Nacos 时使用直接 URL）
feign:
  sentinel:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      workflow-service:
        url: http://localhost:8082
      hr-service:
        url: http://localhost:8085
      message-service:
        url: http://localhost:8081
      system-service:
        url: http://localhost:8081

# 用户服务配置
user:
  default-password: ${USER_DEFAULT_PASSWORD:Solidoa@2026}
