server:
  port: 8087

spring:
  application:
    name: dingtalk-service
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/oa_common?useUnicode=true&characterEncoding=utf8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

dingtalk:
  app-key: ${DINGTALK_APP_KEY:}
  app-secret: ${DINGTALK_APP_SECRET:}
  agent-id: ${DINGTALK_AGENT_ID:}
  callback-url: ${DINGTALK_CALLBACK_URL:}
  callback-token: ${DINGTALK_CALLBACK_TOKEN:}
  callback-aes-key: ${DINGTALK_CALLBACK_AES_KEY:}

shedlock:
  defaults:
    lock-at-most-for: 10m

management:
  endpoints:
    web:
      exposure:
        include: health
